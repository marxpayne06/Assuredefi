<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Gallery</h1>
        <p>The images below are configured to load safely and efficiently without crashing the page.</p>
        
        <div class="gallery">
            <!-- Ensure your image paths match your local project folder structure -->
            <img src="images/photo1.jpg" alt="Beautiful Landscape" loading="lazy">
            <img src="images/photo2.jpg" alt="City Skyline" loading="lazy">
            <img src="images/photo3.jpg" alt="Abstract Art" loading="lazy">
        </div>
    </div>

</body>
</html>
